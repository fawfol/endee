<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endee RAG Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #212121; color: #ececec; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background-color: #171717; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        #header span { font-size: 0.8rem; background: #10a37f; padding: 3px 8px; border-radius: 12px; color: white; }
        #chat-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; }
        .user-message { background-color: #2f2f2f; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-message { background-color: #10a37f; color: white; align-self: flex-start; border-bottom-left-radius: 0; }
        .system-message { background-color: transparent; color: #888; align-self: center; font-size: 0.9rem; font-style: italic; }
        #input-container { padding: 20px; background-color: #171717; border-top: 1px solid #333; display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background-color: #2f2f2f; color: white; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: #10a37f; }
        button { padding: 12px 20px; background-color: #10a37f; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #0d8a6a; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="header">
        Endee Local RAG Assistant
        <span>Qwen 0.5B + AVX2</span>
    </div>

    <div id="chat-container">
        <div class="message system-message">Vector Database Connected. Knowledge base loaded. How can I help you with your Documennt? </div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a question about the documents..." autocomplete="off" onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            // UI loading
            sendBtn.disabled = true;
            sendBtn.innerText = 'THINKING...';

            try {
                //send to FastAPI backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                const data = await response.json();
                
                if (data.answer) {
                    appendMessage(data.answer, 'ai');
                } else {
                    appendMessage("Error: Could not get a response.", 'ai');
                }
            } catch (error) {
                appendMessage("Error connecting to the server.", 'ai');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'SEND';
                userInput.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
